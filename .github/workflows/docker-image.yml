name: Build docker image

on:
  push:
    tags:
      - "*"
    branches:
      - main
      - "3.3.*"
  workflow_dispatch:
    # Можно запустить вручную из любой ветки

jobs:
  build-docker-image:
    runs-on: ubuntu-latest # Изменено с self-hosted на ubuntu-latest для надежности
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Go build + cabinet tests + slog check
        run: |
          go build ./...
          go test ./internal/cabinet/...
          bash scripts/cabinet-forbid-sensitive-slogs.sh

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version and commit
        id: vars
        run: |
          if [ "${{ github.ref_type }}" == "tag" ]; then
            VERSION="${{ github.ref_name }}"
          else
            # Для коммитов используем short SHA
            VERSION="dev-$(echo ${{ github.sha }} | cut -c1-7)"
          fi
          COMMIT="$(echo ${{ github.sha }} | cut -c1-7)"
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "COMMIT=$COMMIT" >> $GITHUB_OUTPUT
          echo "📦 Версия: $VERSION, Коммит: $COMMIT"

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/remnawave-telegram-shop-bot
          tags: |
            # latest только для git тегов (production версий), но НЕ для тегов 3.3.* и НЕ для коммитов в main
            type=raw,value=latest,enable=${{ github.ref_type == 'tag' && !startsWith(github.ref_name, '3.3.') }}
            # Версия из переменной (для всех веток и тегов)
            type=raw,value=${{ steps.vars.outputs.VERSION }}
            # Для ветки 3.3.* (НЕ тегов) создаем тег с префиксом ветки
            type=raw,value=3.3.x-${{ steps.vars.outputs.VERSION }},enable=${{ startsWith(github.ref, 'refs/heads/3.3.') }}
            # Semver теги только для git тегов (но НЕ для тегов 3.3.*)
            type=semver,pattern={{version}},enable=${{ github.ref_type == 'tag' && !startsWith(github.ref_name, '3.3.') }}
            type=semver,pattern={{major}}.{{minor}},enable=${{ github.ref_type == 'tag' && !startsWith(github.ref_name, '3.3.') }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VERSION=${{ steps.vars.outputs.VERSION }}
            COMMIT=${{ steps.vars.outputs.COMMIT }}
