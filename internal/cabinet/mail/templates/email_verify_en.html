<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Verify your email</title>
</head>
<body style="margin:0;padding:24px;background:#f4f5f7;font-family:Segoe UI,Arial,sans-serif;color:#222;">
<div style="max-width:480px;margin:0 auto;background:#ffffff;border-radius:12px;padding:32px;box-shadow:0 4px 16px rgba(0,0,0,0.04);">
    <h1 style="margin:0 0 16px;font-size:22px;line-height:1.3;">Verify your email</h1>
    <p style="margin:0 0 16px;font-size:15px;line-height:1.5;">You've just registered in the cabinet. Click the button below to activate your account.</p>
    <p style="margin:24px 0;text-align:center;">
        <a href="{{ .VerifyURL }}" style="display:inline-block;padding:12px 20px;background:#2563eb;color:#ffffff;text-decoration:none;border-radius:8px;font-weight:600;">Verify email</a>
    </p>
    <p style="margin:0 0 8px;font-size:13px;color:#666;">If the button doesn't work, open this link manually:</p>
    <p style="margin:0 0 16px;font-size:13px;word-break:break-all;"><a href="{{ .VerifyURL }}" style="color:#2563eb;">{{ .VerifyURL }}</a></p>
    <p style="margin:0 0 8px;font-size:13px;color:#666;">The link is valid for {{ .TTLHuman }}.</p>
    <p style="margin:24px 0 0;font-size:12px;color:#999;">If you didn't register, just ignore this email.</p>
</div>
</body>
</html>
