<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Verify your email</title>
</head>
<body style="margin:0;padding:24px;background:#f4f5f7;font-family:Segoe UI,Arial,sans-serif;color:#222;">
<div style="max-width:480px;margin:0 auto;background:#ffffff;border-radius:12px;padding:32px;box-shadow:0 4px 16px rgba(0,0,0,0.04);">
    <h1 style="margin:0 0 16px;font-size:22px;line-height:1.3;">Verify your email</h1>
    <p style="margin:0 0 16px;font-size:15px;line-height:1.5;">Enter this code in the cabinet to confirm your address:</p>
    <p style="margin:24px 0;text-align:center;font-size:32px;letter-spacing:0.35em;font-weight:700;font-family:ui-monospace,Consolas,monospace;color:#1e3a8a;">{{ .Code }}</p>
    <p style="margin:0 0 8px;font-size:13px;color:#666;">The code is valid for {{ .TTLHuman }}. If you request a new code, the old one stops working.</p>
    <p style="margin:24px 0 0;font-size:12px;color:#999;">If you didn't request this, you can ignore this email.</p>
</div>
</body>
</html>
